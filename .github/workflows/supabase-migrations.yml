# Applies pending SQL from supabase/migrations using scripts/apply-all-migrations.cjs
# Set repository secret: DATABASE_URL (Supabase → Settings → Database → URI)

name: Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "scripts/apply-all-migrations.cjs"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=optional --no-audit --no-fund

      - name: Apply pending migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate
