# Applies pending SQL from supabase/migrations using scripts/apply-all-migrations.cjs
# Set repository secret: DATABASE_URL (Supabase → Settings → Database → URI)

name: Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "scripts/apply-all-migrations.cjs"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:
    inputs:
      database_url:
        description: "Optional override DATABASE_URL for this run"
        required: false
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Resolve DATABASE_URL
        id: dburl
        env:
          SECRET_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          INPUT_DATABASE_URL: ${{ inputs.database_url }}
        run: |
          DB_URL="${SECRET_DATABASE_URL}"
          if [ -z "$DB_URL" ] && [ -n "$INPUT_DATABASE_URL" ]; then
            DB_URL="$INPUT_DATABASE_URL"
          fi

          if [ -z "$DB_URL" ]; then
            echo "::warning::DATABASE_URL is not configured; skipping migrations."
            echo "has_url=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          echo "has_url=true" >> "$GITHUB_OUTPUT"

      - name: Install migration runtime dependency only
        if: steps.dburl.outputs.has_url == 'true'
        run: npm install --no-save --no-audit --no-fund pg@8

      - name: Apply pending migrations
        if: steps.dburl.outputs.has_url == 'true'
        run: node scripts/apply-all-migrations.cjs

      - name: Migrations skipped
        if: steps.dburl.outputs.has_url != 'true'
        run: echo "Skipping migration apply because DATABASE_URL is not set."
